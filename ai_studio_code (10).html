<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="theme-color" content="#000000">
    <title>SRI KUNJ POS | NEXUS</title>
    
    <style>
        :root {
            --bg: #050505;
            --panel: rgba(25, 25, 25, 0.7);
            --glass-border: rgba(255, 255, 255, 0.1);
            --primary: #bc13fe;
            --secondary: #00f2ff;
            --error: #ff2e63;
            --text: #e0e0e0;
        }

        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; outline: none; -webkit-user-select: none; user-select: none; }

        html, body {
            margin: 0; padding: 0;
            background: var(--bg);
            background-image: radial-gradient(circle at 50% -20%, #1a1a2e 0%, #050505 80%);
            color: var(--text);
            font-family: 'Segoe UI', system-ui, sans-serif;
            height: 100%; width: 100vw;
            overflow: hidden; position: fixed;
        }

        .app-wrapper { display: flex; height: 100vh; height: 100dvh; width: 100%; flex-direction: row; }
        .bill-side { flex: 1.2; display: flex; flex-direction: column; border-right: 1px solid var(--glass-border); min-width: 0; height: 100%; }
        .calc-side { flex: 0.8; display: flex; flex-direction: column; background: rgba(0,0,0,0.3); min-width: 0; height: 100%; }

        @media (max-aspect-ratio: 1/1), (max-width: 600px) {
            .app-wrapper { flex-direction: column; }
            .bill-side { height: 42vh; flex: none; border-right: none; border-bottom: 1px solid var(--glass-border); }
            .calc-side { height: 58vh; flex: none; }
        }

        .tab-bar { display: flex; background: rgba(0,0,0,0.5); padding: 5px; gap: 5px; flex-shrink: 0; }
        .tab { flex: 1; padding: 12px; text-align: center; border-radius: 8px; color: #666; font-weight: 800; font-size: 0.75rem; letter-spacing: 1px; cursor: pointer; transition: 0.3s; }
        .tab.active { color: var(--secondary); background: rgba(0, 242, 255, 0.1); border: 1px solid rgba(0, 242, 255, 0.3); }

        .header { padding: 10px 15px; display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid var(--glass-border); flex-shrink: 0; }
        .view { display: none; flex: 1; flex-direction: column; overflow: hidden; height: 100%; }
        .view.active { display: flex; }
        .item-list, .history-list { flex: 1; overflow-y: auto; padding: 10px; -webkit-overflow-scrolling: touch; }

        .item-card, .history-card { background: var(--panel); backdrop-filter: blur(10px); margin-bottom: 8px; padding: 12px; border-radius: 12px; border: 1px solid var(--glass-border); display: flex; justify-content: space-between; align-items: center; }
        .item-card.editing { border-color: var(--primary); background: rgba(188, 19, 254, 0.1); }

        .bill-footer { background: rgba(0,0,0,0.6); padding: 12px; border-top: 1px solid var(--glass-border); flex-shrink: 0; }
        .total-display { display: flex; justify-content: space-between; align-items: baseline; margin-bottom: 10px; }
        .total-display span:last-child { font-size: 1.8rem; font-weight: 900; color: var(--secondary); }
        
        .display-area { padding: 10px 20px; text-align: right; border-bottom: 1px solid var(--glass-border); }
        .name-input-container { margin-bottom: 8px; display: flex; gap: 5px; }
        .name-input-container input { flex: 1; background: rgba(255,255,255,0.05); border: 1px solid var(--glass-border); color: #fff; padding: 8px; border-radius: 5px; font-size: 0.8rem; -webkit-user-select: text; user-select: text; }
        .save-item-btn { background: var(--primary); border: none; color: white; padding: 0 10px; border-radius: 5px; font-size: 0.6rem; font-weight: bold; }
        
        .formula { color: var(--primary); font-size: 0.8rem; font-weight: 700; margin-bottom: 5px; }
        .current-val { font-size: 2.2rem; font-weight: 200; line-height: 1; color: #fff; }
        .active-txt { border-bottom: 2px solid var(--primary); color: #fff; }

        .quick-items { display: flex; overflow-x: auto; gap: 8px; padding: 8px; background: rgba(0,0,0,0.2); scrollbar-width: none; }
        .q-chip { flex-shrink: 0; background: rgba(255,255,255,0.08); padding: 8px 15px; border-radius: 20px; font-size: 0.7rem; border: 1px solid var(--glass-border); color: #bbb; }
        .q-chip.delete-mode { border-color: var(--error); color: var(--error); }

        .keypad { flex: 1; display: grid; grid-template-columns: repeat(4, 1fr); gap: 6px; padding: 10px; }
        .keypad button { background: rgba(255,255,255,0.03); border: 1px solid var(--glass-border); color: #fff; font-size: 1.6rem; border-radius: 12px; }
        .keypad button.pressed { background: var(--primary) !important; color: white !important; transform: scale(0.92); }
        .enter-btn { background: linear-gradient(135deg, var(--secondary), #00a2ff) !important; color: black !important; grid-column: span 2; font-weight: 800; border: none; }

        .switch-container { display: flex; justify-content: space-between; align-items: center; margin-bottom: 15px; padding: 0 5px; }
        .switch { position: relative; display: inline-block; width: 34px; height: 20px; }
        .switch input { opacity: 0; width: 0; height: 0; }
        .slider { position: absolute; cursor: pointer; top: 0; left: 0; right: 0; bottom: 0; background-color: #333; transition: .4s; border-radius: 20px; border: 1px solid var(--glass-border); }
        .slider:before { position: absolute; content: ""; height: 12px; width: 12px; left: 3px; bottom: 3px; background-color: white; transition: .4s; border-radius: 50%; }
        input:checked + .slider { background-color: var(--secondary); box-shadow: 0 0 10px rgba(0, 242, 255, 0.3); }
        input:checked + .slider:before { transform: translateX(14px); }

        .btn-sm { padding: 8px 12px; border-radius: 8px; font-size: 0.7rem; font-weight: 800; cursor: pointer; border: 1px solid var(--glass-border); }
        .btn-edit { background: rgba(188, 19, 254, 0.1); color: var(--primary); margin-right: 5px; }
        .btn-del { background: rgba(255, 46, 99, 0.1); color: var(--error); }

        /* PRINT STYLES */
        #receipt-print { display: none; }
        @media print {
            .app-wrapper { display: none !important; }
            #receipt-print { 
                display: block !important; width: 58mm; color: #000; background: #fff; padding: 0; margin: 0; 
                font-family: 'Arial', sans-serif; font-size: 12px; line-height: 1.1;
            }
            .r-header { display: flex; align-items: center; border-bottom: 2px solid #000; padding-bottom: 5px; margin-bottom: 5px; gap: 5px; }
            .r-logo-svg { height: 45px; width: 45px; flex-shrink: 0; }
            .r-info h3 { margin: 0; font-size: 14px; font-weight: 900; }
            .r-info div { font-size: 10px; font-weight: 700; }
            
            table { width: 100%; border-collapse: collapse; table-layout: fixed; margin-top: 5px; }
            .col-sn { width: 10%; }
            .col-item { width: 22%; }
            .col-rate { width: 24%; }
            .col-qty { width: 18%; }
            .col-total { width: 26%; }

            th { border-bottom: 1.5px solid #000; padding: 4px 0; font-size: 10px; font-weight: 900; text-transform: uppercase; }
            td { padding: 6px 0; vertical-align: top; font-size: 12px; overflow: hidden; }
            .td-num { text-align: right; white-space: nowrap; font-variant-numeric: tabular-nums; padding-left: 4px; }

            .t-total { border-top: 2px solid #000; }
            .t-total td { font-size: 15px; font-weight: 900; padding-top: 8px; white-space: nowrap; }
            
            .qr-container { text-align: center; margin-top: 10px; width: 100%; }
            #r-qr { width: 100% !important; height: auto !important; max-width: 58mm; }
            center p { font-weight: 900; margin-top: 10px; border-top: 1px dashed #000; padding-top: 5px; font-size: 10px; }
        }
    </style>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrious/4.0.2/qrious.min.js"></script>
</head>
<body>

    <div class="app-wrapper">
        <div class="bill-side">
            <div class="tab-bar">
                <div class="tab active" data-tab="pos">BILLING</div>
                <div class="tab" data-tab="history">HISTORY</div>
            </div>
            <div id="pos-view" class="view active">
                <div class="header">
                    <span id="bill-indicator" style="font-weight:900; color:var(--primary); font-size:0.7rem;">NEW TERMINAL</span>
                    <span id="count" style="font-size:0.7rem; color:#888">0 ITEMS</span>
                </div>
                <div id="item-list" class="item-list"></div>
                <div class="bill-footer">
                    <div class="total-display">
                        <span>NET TOTAL</span>
                        <span id="grand-total">0.00</span>
                    </div>
                    <div class="switch-container">
                        <span id="shop-label" style="font-size: 0.7rem; color: var(--secondary); letter-spacing: 1px; font-weight: 800;">SHOP: SRI KUNJ</span>
                        <label class="switch">
                            <input type="checkbox" id="shop-toggle">
                            <span class="slider"></span>
                        </label>
                    </div>
                    <div class="print-actions">
                        <button class="main-btn" id="reset-btn" style="padding:12px; width:48%; border-radius:8px; background:rgba(255,255,255,0.05); color:#fff; border:none;">CLEAR</button>
                        <button class="main-btn" id="finish-btn" style="padding:12px; width:48%; border-radius:8px; background:var(--secondary); color:#000; font-weight:900; border:none;">FINISH</button>
                    </div>
                </div>
            </div>
            <div id="history-view" class="view">
                <div class="header"><b>TRANSACTION ARCHIVE</b></div>
                <div id="history-list" class="history-list"></div>
            </div>
        </div>

        <div class="calc-side">
            <div class="display-area">
                <div class="name-input-container">
                    <input type="text" id="item-name" placeholder="Item Name (Optional)" autocomplete="off">
                    <button class="save-item-btn" id="save-item-ref">SAVE</button>
                </div>
                <div class="formula">
                    <span id="f-rate" class="active-txt">RATE</span> × <span id="f-qty">QTY</span>
                </div>
                <div id="v-main" class="current-val">0</div>
            </div>
            <div class="quick-items-wrapper" style="display:flex; align-items:center;">
                <div class="quick-items" id="quick-items-list" style="flex:1"></div>
                <button id="toggle-edit-chips" style="background:none; border:none; color:#444; font-size:1.2rem; padding:10px;">⚙</button>
            </div>
            <div class="keypad" id="keypad-grid">
                <button data-val="7">7</button><button data-val="8">8</button><button data-val="9">9</button>
                <button style="color:var(--error)" data-val="BS">⌫</button>
                <button data-val="4">4</button><button data-val="5">5</button><button data-val="6">6</button>
                <button style="color:var(--secondary)" data-val="C">C</button>
                <button data-val="1">1</button><button data-val="2">2</button><button data-val="3">3</button>
                <button style="color:var(--secondary)" data-val="X">X</button>
                <button data-val="0">0</button><button data-val=".">.</button>
                <button id="add-btn" class="enter-btn" data-val="ADD">ADD ITEM</button>
            </div>
        </div>
    </div>

    <div id="receipt-print">
        <div class="r-header">
            <svg class="r-logo-svg" viewBox="0 0 100 100">
                <circle cx="50" cy="50" r="48" fill="none" stroke="black" stroke-width="2"/>
                <circle cx="50" cy="50" r="43" fill="none" stroke="black" stroke-width="4"/>
                <text x="45" y="65" font-family="Georgia, serif" font-size="45" font-weight="900" fill="black" text-anchor="middle">S</text>
                <text x="65" y="65" font-family="Georgia, serif" font-size="35" font-weight="900" fill="black" text-anchor="middle">K</text>
                <path d="M40 58 L85 58" stroke="black" stroke-width="2" />
                <path d="M85 58 Q90 50 95 58 T85 66 Z" fill="black"/>
            </svg>
            <div class="r-info">
                <h3 id="r-shop-name">SRI KUNJ</h3>
                <div id="r-shop-addr">LN Road, Islampur</div>
                <div id="r-shop-ph">PH: 9153306606, 7992265787</div>
            </div>
        </div>
        <div style="display:flex; justify-content:space-between; font-size:10px; font-weight:900;">
            <span id="r-date"></span><span>CASH MEMO</span>
        </div>
        <table>
            <thead>
                <tr>
                    <th class="col-sn" style="text-align:left">SN</th>
                    <th class="col-item" style="text-align:left">Item</th>
                    <th class="col-rate" style="text-align:right">Rate</th>
                    <th class="col-qty" style="text-align:right">Qty</th>
                    <th class="col-total" style="text-align:right">Total</th>
                </tr>
            </thead>
            <tbody id="r-body"></tbody>
            <tfoot>
                <tr class="t-total">
                    <td colspan="2">TOTAL</td>
                    <td colspan="3" id="r-total-amt" style="text-align:right">0</td>
                </tr>
            </tfoot>
        </table>
        <div class="qr-container"><canvas id="r-qr"></canvas></div>
        <center><p>SCAN TO PAY • NO EXCHANGE NO REFUND</p></center>
    </div>

<script>
    let items = [], 
        billHistory = JSON.parse(localStorage.getItem('pos_history')||'[]'), 
        savedItemNames = JSON.parse(localStorage.getItem('pos_saved_items')||'[]'),
        rate = "", qty = "", isQtyMode = false, editingItemId = null, activeBillId = null, chipDeleteMode = false;

    const SHOPS = {
        srikunj: { name: "SRI KUNJ", upi: "Q002609502@ybl", addr: "LN Road, Islampur", ph: "9153306606" },
        skgift: { name: "SK Gift and Toys", upi: "Q562576892@ybl", addr: "LN Road, Islampur", ph: "7992265787" }
    };

    // Indian Comma Formatters
    const fmt = (v) => new Intl.NumberFormat('en-IN', {minimumFractionDigits:2, maximumFractionDigits:2}).format(v);
    const fmtInt = (v) => new Intl.NumberFormat('en-IN', {maximumFractionDigits:0}).format(Math.round(v));

    window.onload = () => {
        const keypad = document.getElementById('keypad-grid');
        keypad.addEventListener('pointerdown', (e) => {
            if (e.target.tagName === 'BUTTON') {
                e.preventDefault(); e.target.classList.add('pressed');
                handleInput(e.target.dataset.val);
            }
        });
        keypad.addEventListener('pointerup', (e) => e.target.classList.remove('pressed'));

        document.getElementById('finish-btn').onclick = saveAndPrint;
        document.getElementById('reset-btn').onclick = resetApp;
        document.getElementById('save-item-ref').onclick = () => {
            let n = document.getElementById('item-name').value.trim();
            if(n && !savedItemNames.includes(n)) { savedItemNames.push(n); localStorage.setItem('pos_saved_items', JSON.stringify(savedItemNames)); renderQuickItems(); }
        };
        document.getElementById('toggle-edit-chips').onclick = () => { chipDeleteMode = !chipDeleteMode; renderQuickItems(); };
        document.querySelectorAll('.tab').forEach(t => t.onclick = () => switchTab(t.dataset.tab));

        document.getElementById('shop-toggle').addEventListener('change', (e) => {
            const shop = e.target.checked ? SHOPS.skgift : SHOPS.srikunj;
            document.getElementById('shop-label').innerText = "SHOP: " + shop.name;
        });

        renderQuickItems(); renderPOS();
    };

    function handleInput(k) {
        if (k === 'C') { rate = ""; qty = ""; isQtyMode = false; editingItemId = null; document.getElementById('item-name').value = ""; }
        else if (k === 'BS') { if (isQtyMode) qty = qty.slice(0,-1); else rate = rate.slice(0,-1); }
        else if (k === 'X') isQtyMode = !isQtyMode;
        else if (k === 'ADD') {
            if (!rate || !qty) return;
            let n = document.getElementById('item-name').value.trim() || "Item";
            let item = { id: editingItemId || Date.now(), name: n, rate: parseFloat(rate), qty: parseFloat(qty), amt: parseFloat(rate)*parseFloat(qty) };
            if (editingItemId) { let i = items.findIndex(x => x.id === editingItemId); items[i] = item; } else items.push(item);
            rate = ""; qty = ""; isQtyMode = false; editingItemId = null; document.getElementById('item-name').value = "";
        } else {
            if (isQtyMode) { if(k==='.' && qty.includes('.')) return; qty += k; }
            else { if(k==='.' && rate.includes('.')) return; rate += k; }
        }
        renderPOS();
    }

    function renderQuickItems() {
        const c = document.getElementById('quick-items-list'); c.innerHTML = "";
        savedItemNames.forEach((n, i) => {
            let d = document.createElement('div'); d.className = `q-chip ${chipDeleteMode ? 'delete-mode' : ''}`;
            d.innerText = n; d.onclick = () => {
                if(chipDeleteMode) { savedItemNames.splice(i, 1); localStorage.setItem('pos_saved_items', JSON.stringify(savedItemNames)); renderQuickItems(); }
                else document.getElementById('item-name').value = n;
            };
            c.appendChild(d);
        });
    }

    function renderPOS() {
        const l = document.getElementById('item-list'); l.innerHTML = ""; let t = 0;
        items.forEach(i => {
            t += i.amt; let d = document.createElement('div'); d.className = `item-card ${editingItemId === i.id ? 'editing' : ''}`;
            d.innerHTML = `<div style="flex:1" onclick="editItem(${i.id})"><b>${i.name}</b><br><small>${fmt(i.rate)} × ${i.qty}</small><br><b style="color:var(--secondary)">₹${fmt(i.amt)}</b></div><button onclick="deleteItem(${i.id})" style="background:none; border:none; color:var(--error); font-weight:900">DEL</button>`;
            l.appendChild(d);
        });
        document.getElementById('grand-total').innerText = fmt(t);
        document.getElementById('count').innerText = items.length + " ITEMS";
        document.getElementById('f-rate').innerText = rate || "RATE"; document.getElementById('f-qty').innerText = qty || "QTY";
        document.getElementById('v-main').innerText = isQtyMode ? (qty || "0") : (rate || "0");
        document.getElementById('f-rate').className = isQtyMode ? "" : "active-txt";
        document.getElementById('f-qty').className = isQtyMode ? "active-txt" : "";
        document.getElementById('bill-indicator').innerText = activeBillId ? "EDITING ARCHIVE" : "NEW TERMINAL";
        l.scrollTop = l.scrollHeight;
    }

    function saveAndPrint() {
        if (!items.length) return;
        const shop = document.getElementById('shop-toggle').checked ? SHOPS.skgift : SHOPS.srikunj;
        const total = items.reduce((s, i) => s + i.amt, 0);

        // SAVE LOGIC (Handles new vs edit)
        const billData = {
            id: activeBillId || Date.now(),
            shop: shop.name,
            timestamp: new Date().toLocaleString('en-IN', {dateStyle:'short', timeStyle:'short'}),
            total: total,
            items: JSON.parse(JSON.stringify(items))
        };

        if (activeBillId) {
            let idx = billHistory.findIndex(b => b.id === activeBillId);
            if (idx > -1) billHistory[idx] = billData;
        } else {
            billHistory.unshift(billData);
        }
        localStorage.setItem('pos_history', JSON.stringify(billHistory));

        // PRINT PREP
        document.getElementById('r-shop-name').innerText = shop.name;
        document.getElementById('r-date').innerText = new Date().toLocaleDateString('en-IN');
        document.getElementById('r-total-amt').innerText = "₹" + fmtInt(total);
        
        let h = "";
        items.forEach((i, idx) => {
            let name = (i.name === "Item" || i.name.trim() === "") ? "__________" : i.name;
            h += `<tr><td>${idx+1}</td><td style="text-transform:uppercase">${name}</td><td class="td-num">${fmt(i.rate)}</td><td class="td-num">${i.qty}</td><td class="td-num">${fmtInt(i.amt)}</td></tr>`;
        });
        document.getElementById('r-body').innerHTML = h;
        new QRious({ element: document.getElementById('r-qr'), value: `upi://pay?pa=${shop.upi}&pn=${encodeURIComponent(shop.name)}&am=${total.toFixed(2)}`, size: 400, level: 'H' });
        
        setTimeout(() => { window.print(); resetApp(); }, 400);
    }

    function renderHistory() {
        const hList = document.getElementById('history-list');
        hList.innerHTML = billHistory.length === 0 ? '<p style="text-align:center; opacity:0.3; margin-top:40px;">EMPTY</p>' : '';
        billHistory.forEach((b) => {
            let d = document.createElement('div'); d.className = "history-card";
            d.innerHTML = `
                <div><b>₹${fmt(b.total)}</b><br><small>${b.shop} • ${b.timestamp}</small></div>
                <div>
                    <button class="btn-sm btn-edit" onclick="loadBillForEdit(${b.id})">EDIT</button>
                    <button class="btn-sm btn-del" onclick="delHistory(${b.id})">DEL</button>
                </div>`;
            hList.appendChild(d);
        });
    }

    window.loadBillForEdit = (id) => {
        const bill = billHistory.find(b => b.id === id);
        if (bill) {
            items = JSON.parse(JSON.stringify(bill.items));
            activeBillId = bill.id;
            const isGifts = (bill.shop === SHOPS.skgift.name);
            document.getElementById('shop-toggle').checked = isGifts;
            document.getElementById('shop-label').innerText = "SHOP: " + bill.shop;
            switchTab('pos');
            renderPOS();
        }
    };

    window.delHistory = (id) => {
        if(confirm("DELETE?")) {
            billHistory = billHistory.filter(x => x.id !== id);
            localStorage.setItem('pos_history', JSON.stringify(billHistory));
            renderHistory();
        }
    };

    window.editItem = (id) => { 
        let i = items.find(x => x.id === id); 
        rate = i.rate.toString(); qty = i.qty.toString(); 
        document.getElementById('item-name').value = i.name; 
        editingItemId = id; renderPOS(); 
    };

    window.deleteItem = (id) => { items = items.filter(x => x.id !== id); renderPOS(); };
    
    function switchTab(t) { 
        document.querySelectorAll('.tab, .view').forEach(el => el.classList.remove('active')); 
        document.querySelector(`[data-tab="${t}"]`).classList.add('active'); 
        document.getElementById(`${t}-view`).classList.add('active');
        if(t === 'history') renderHistory();
    }
    
    function resetApp() { items = []; rate = ""; qty = ""; editingItemId = null; activeBillId = null; renderPOS(); }
</script>
</body>
</html>
