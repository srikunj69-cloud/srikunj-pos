<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="theme-color" content="#000000">
    <title>SRI KUNJ POS | NEXUS</title>
    <link rel="manifest" href="manifest.json">
    <link rel="apple-touch-icon" href="logo.png">
    
    <style>
        :root {
            --bg: #050505;
            --panel: rgba(25, 25, 25, 0.7);
            --glass-border: rgba(255, 255, 255, 0.1);
            --primary: #bc13fe;
            --secondary: #00f2ff;
            --error: #ff2e63;
            --text: #e0e0e0;
            --accent-glow: rgba(188, 19, 254, 0.3);
        }

        * { 
            box-sizing: border-box; 
            -webkit-tap-highlight-color: transparent; 
            outline: none;
            -webkit-user-select: none;
            user-select: none;
        }

        html, body {
            margin: 0; padding: 0;
            background: var(--bg);
            background-image: radial-gradient(circle at 50% -20%, #1a1a2e 0%, #050505 80%);
            color: var(--text);
            font-family: 'Segoe UI', system-ui, sans-serif;
            height: 100%; width: 100vw;
            overflow: hidden; position: fixed;
        }

        .app-wrapper { display: flex; height: 100vh; height: 100dvh; width: 100%; flex-direction: row; }

        .bill-side { flex: 1.2; display: flex; flex-direction: column; border-right: 1px solid var(--glass-border); min-width: 0; height: 100%; }
        .calc-side { flex: 0.8; display: flex; flex-direction: column; background: rgba(0,0,0,0.3); min-width: 0; height: 100%; }

        @media (max-aspect-ratio: 1/1), (max-width: 600px) {
            .app-wrapper { flex-direction: column; }
            .bill-side { height: 42vh; flex: none; border-right: none; border-bottom: 1px solid var(--glass-border); }
            .calc-side { height: 58vh; flex: none; }
        }

        .tab-bar { display: flex; background: rgba(0,0,0,0.5); padding: 5px; gap: 5px; flex-shrink: 0; }
        .tab { flex: 1; padding: 12px; text-align: center; border-radius: 8px; color: #666; font-weight: 800; font-size: 0.75rem; letter-spacing: 1px; transition: all 0.3s ease; cursor: pointer; }
        .tab.active { color: var(--secondary); background: rgba(0, 242, 255, 0.1); border: 1px solid rgba(0, 242, 255, 0.3); }

        .header { padding: 10px 15px; display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid var(--glass-border); flex-shrink: 0; }
        .view { display: none; flex: 1; flex-direction: column; overflow: hidden; height: 100%; }
        .view.active { display: flex; }
        .item-list, .history-list { flex: 1; overflow-y: auto; padding: 10px; background: transparent; -webkit-overflow-scrolling: touch; }

        .item-card, .history-card { background: var(--panel); backdrop-filter: blur(10px); margin-bottom: 8px; padding: 12px; border-radius: 12px; border: 1px solid var(--glass-border); display: flex; justify-content: space-between; align-items: center; }
        .item-card.editing { border-color: var(--primary); background: rgba(188, 19, 254, 0.1); }

        .bill-footer { background: rgba(0,0,0,0.6); padding: 12px; border-top: 1px solid var(--glass-border); flex-shrink: 0; }
        .total-display { display: flex; justify-content: space-between; align-items: baseline; margin-bottom: 10px; }
        .total-display span:last-child { font-size: 1.8rem; font-weight: 900; color: var(--secondary); text-shadow: 0 0 10px rgba(0, 242, 255, 0.3); }
        .print-actions { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }

        .display-area { height: 22%; padding: 0 25px; display: flex; flex-direction: column; justify-content: center; text-align: right; flex-shrink: 0; }
        .formula { color: var(--primary); font-size: 0.8rem; font-weight: 700; margin-bottom: 5px; }
        .current-val { font-size: 3rem; font-weight: 200; line-height: 1; color: #fff; }
        .active-txt { border-bottom: 2px solid var(--primary); color: #fff; padding-bottom: 2px; }

        .keypad { flex: 1; display: grid; grid-template-columns: repeat(4, 1fr); gap: 6px; padding: 10px; background: transparent; touch-action: none; padding-bottom: env(safe-area-inset-bottom, 20px); }
        .keypad button { background: rgba(255,255,255,0.03); border: 1px solid var(--glass-border); color: #fff; font-size: 1.6rem; font-weight: 300; border-radius: 12px; display: flex; align-items: center; justify-content: center; transition: background 0.1s; }
        .keypad button.pressed { background: var(--primary) !important; color: white !important; transform: scale(0.95); }

        .op-btn { color: var(--secondary) !important; background: rgba(0, 242, 255, 0.05) !important; }
        .del-btn { color: var(--error) !important; background: rgba(255, 46, 99, 0.05) !important; }
        .enter-btn { background: linear-gradient(135deg, var(--secondary), #00a2ff) !important; color: black !important; grid-column: span 2; font-weight: 800 !important; font-size: 1rem !important; border: none !important; }

        .btn-sm { padding: 8px 12px; border: 1px solid var(--glass-border); border-radius: 8px; font-size: 0.7rem; font-weight: 800; cursor: pointer; }
        .btn-edit { background: rgba(188, 19, 254, 0.1); color: var(--primary); }
        .btn-del { background: rgba(255, 46, 99, 0.1); color: var(--error); }
        .main-btn { padding: 14px; border-radius: 12px; font-weight: 800; font-size: 0.8rem; border: 1px solid var(--glass-border); cursor: pointer; }

        /* Futuristic Toggle Switch */
.switch { position: relative; display: inline-block; width: 34px; height: 20px; }
.switch input { opacity: 0; width: 0; height: 0; }
.slider { position: absolute; cursor: pointer; top: 0; left: 0; right: 0; bottom: 0; background-color: #333; transition: .4s; border-radius: 20px; border: 1px solid var(--glass-border); }
.slider:before { position: absolute; content: ""; height: 12px; width: 12px; left: 3px; bottom: 3px; background-color: white; transition: .4s; border-radius: 50%; }
input:checked + .slider { background-color: var(--secondary); box-shadow: 0 0 10px rgba(0, 242, 255, 0.3); }
input:checked + .slider:before { transform: translateX(14px); }
        
        /* PRINT STYLES */
        #receipt-print { display: none; }
        @media print {
            .app-wrapper { display: none !important; }
            #receipt-print { display: block !important; width: 58mm; color: #000; background: #fff; padding: 0; font-family: Arial, sans-serif; font-size: 10px; }
            .r-header { text-align: center; border-bottom: 1px dashed #000; padding-bottom: 5px; }
            .r-header h3 { margin: 0; font-size: 14px; }
            .qr-container { text-align: center; margin-top: 10px; }
            table { width: 100%; border-collapse: collapse; margin-top: 5px; }
            th { border-bottom: 1px solid #000; padding: 3px 0; }
            td { padding: 3px 0; }
            .t-total { border-top: 1px solid #000; font-weight: bold; }
            .text-right { text-align: right; }
            .text-center { text-align: center; }
        }
    </style>
    <!-- Library for Offline QR Generation -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrious/4.0.2/qrious.min.js"></script>
</head>
<body>

    <div class="app-wrapper">
        <div class="bill-side">
            <div class="tab-bar">
                <div class="tab active" data-tab="pos">BILLING</div>
                <div class="tab" data-tab="history">HISTORY</div>
            </div>

            <div id="pos-view" class="view active">
                <div class="header">
                    <span id="bill-indicator" style="font-weight:900; color:var(--primary); font-size:0.7rem;">NEW TERMINAL</span>
                    <span id="count" style="font-size:0.7rem; color:#888">0 ITEMS</span>
                </div>
                <div id="item-list" class="item-list"></div>
                <div class="bill-footer">
                    <div class="total-display">
                        <span style="font-size:0.7rem; letter-spacing:1px">NET TOTAL</span>
                        <span id="grand-total">0.00</span>
                    </div>
                    <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 15px; padding: 0 5px;">
    <span style="font-size: 0.7rem; color: #888; letter-spacing: 1px;">PRINT UPI QR</span>
    <label class="switch">
        <input type="checkbox" id="qr-toggle" checked>
        <span class="slider"></span>
    </label>
                    </div>
                    <div class="print-actions">
                        <button class="main-btn" style="background:rgba(255,255,255,0.05); color:#fff" id="reset-btn">CLEAR</button>
                        <button class="main-btn" style="background:var(--secondary); color:#000; border:none;" id="finish-btn">FINISH</button>
                    </div>
                </div>
            </div>

            <div id="history-view" class="view">
                <div class="header"><b style="font-size:0.7rem">ARCHIVED TRANSACTIONS</b></div>
                <div id="history-list" class="history-list"></div>
            </div>
        </div>

        <div class="calc-side">
            <div class="display-area">
                <div class="formula">
                    <span id="f-rate" class="active-txt">RATE</span> × <span id="f-qty">QTY</span>
                </div>
                <div id="v-main" class="current-val">0</div>
            </div>
            <div class="keypad" id="keypad-grid">
                <button data-val="7">7</button><button data-val="8">8</button><button data-val="9">9</button>
                <button class="del-btn" data-val="BS">⌫</button>
                
                <button data-val="4">4</button><button data-val="5">5</button><button data-val="6">6</button>
                <button class="op-btn" data-val="C">C</button>
                
                <button data-val="1">1</button><button data-val="2">2</button><button data-val="3">3</button>
                <button class="op-btn" data-val="X">X</button>
                
                <button data-val="0">0</button><button data-val=".">.</button>
                <button id="add-btn" class="enter-btn" data-val="ADD">ADD ITEM</button>
            </div>
        </div>
    </div>

    <!-- PRINT TEMPLATE -->
    <div id="receipt-print">
        <div class="r-header">
            <h3>SRI KUNJ</h3>
            <div style="font-size:9px;">LN Road, Islampur | PH: 9153306606, 7992265787</div>
        </div>
        <div style="padding: 5px 0; display: flex; justify-content: space-between;">
            <span id="r-date"></span>
            <span>Cash Memo</span>
        </div>
        <table>
            <thead>
                <tr><th align="left">S.N</th><th align="left">Rate</th><th class="text-center">Qty</th><th class="text-right">Total</th></tr>
            </thead>
            <tbody id="r-body"></tbody>
            <tfoot>
                <tr class="t-total">
                    <td colspan="2" style="padding-top: 5px;">Total</td>
                    <td id="r-total-qty" class="text-center">0</td>
                    <td id="r-total-amt" class="text-right">0</td>
                </tr>
            </tfoot>
        </table>
        <div class="qr-container">
            <canvas id="r-qr"></canvas>
            <p style="font-size:8px;">Scan to Pay</p>
        </div>
        <center><p style="font-size:9px; font-weight: bold; margin-top: 10px; border-top: 1px dashed #000;">NO EXCHANGE NO REFUND</p></center>
    </div>

<script>
    let items = [];
    let billHistory = JSON.parse(localStorage.getItem('pos_history') || '[]');
    let rate = "";
    let qty = "";
    let isQtyMode = false;
    let editingItemId = null;
    let activeBillId = null;

    const UPI_ID = "Q002609502@ybl";
    const MERCHANT_NAME = "SRI KUNJ";

    const fmt = (val) => new Intl.NumberFormat('en-IN', {minimumFractionDigits: 2, maximumFractionDigits: 2}).format(val);

    // Initializer
    window.onload = () => {
        initEvents();
        renderPOS();
        if ('serviceWorker' in navigator) navigator.serviceWorker.register('sw.js');
    };

    function initEvents() {
        // Tab switching
        document.querySelectorAll('.tab').forEach(tab => {
            tab.addEventListener('click', () => switchTab(tab.dataset.tab));
        });

        // Keypad Input
        const keypad = document.getElementById('keypad-grid');
        keypad.addEventListener('touchstart', (e) => {
            if (e.target.tagName === 'BUTTON') {
                e.preventDefault();
                e.target.classList.add('pressed');
                handleInput(e.target.dataset.val);
            }
        });
        keypad.addEventListener('touchend', (e) => {
            if (e.target.tagName === 'BUTTON') e.target.classList.remove('pressed');
        });
        // Click fallback for PC/broken touch
        keypad.addEventListener('click', (e) => {
            if (e.target.tagName === 'BUTTON') handleInput(e.target.dataset.val);
        });

        // Main action buttons
        document.getElementById('reset-btn').addEventListener('click', resetApp);
        document.getElementById('finish-btn').addEventListener('click', saveAndPrint);
    }

    function handleInput(k) {
        if (k === 'C') {
            rate = ""; qty = ""; isQtyMode = false; editingItemId = null;
        } else if (k === 'BS') {
            if (isQtyMode) qty = qty.toString().slice(0, -1);
            else rate = rate.toString().slice(0, -1);
        } else if (k === 'X') {
            isQtyMode = !isQtyMode;
        } else if (k === 'ADD') {
            if (!rate || !qty) return;
            const item = {
                id: editingItemId || Date.now(),
                rate: parseFloat(rate),
                qty: parseFloat(qty),
                amt: parseFloat(rate) * parseFloat(qty)
            };
            if (editingItemId) {
                const idx = items.findIndex(x => x.id === editingItemId);
                if (idx > -1) items[idx] = item;
            } else {
                items.push(item);
            }
            rate = ""; qty = ""; isQtyMode = false; editingItemId = null;
        } else {
            if (isQtyMode) {
                if (k === "." && qty.includes(".")) return;
                if (qty.length < 5) qty += k;
            } else {
                if (k === "." && rate.includes(".")) return;
                if (rate.length < 7) rate += k;
            }
        }
        renderPOS();
    }

    function switchTab(tab) {
        document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
        document.querySelectorAll('.view').forEach(v => v.classList.remove('active'));
        document.querySelector(`.tab[data-tab="${tab}"]`).classList.add('active');
        document.getElementById(`${tab}-view`).classList.add('active');
        if (tab === 'history') renderHistory();
    }

    function renderPOS() {
        const listEl = document.getElementById('item-list');
        listEl.innerHTML = "";
        let total = 0;
        items.forEach(item => {
            total += item.amt;
            const card = document.createElement('div');
            card.className = `item-card ${editingItemId === item.id ? 'editing' : ''}`;
            card.innerHTML = `
                <div style="flex:1" onclick="editItem(${item.id})">
                    <div style="font-size:0.7rem; color:#888;">${fmt(item.rate)} × ${item.qty}</div>
                    <div style="color:var(--secondary); font-weight:900;">₹${fmt(item.amt)}</div>
                </div>
                <button class="btn-sm btn-del" onclick="deleteItem(${item.id})">DEL</button>`;
            listEl.appendChild(card);
        });
        document.getElementById('grand-total').innerText = fmt(total);
        document.getElementById('count').innerText = items.length + " ITEMS";
        document.getElementById('bill-indicator').innerText = activeBillId ? "EDITING BILL" : "NEW TERMINAL";
        updateCalcDisplay();
        listEl.scrollTop = listEl.scrollHeight;
    }

    function updateCalcDisplay() {
        document.getElementById('f-rate').innerText = rate || "RATE";
        document.getElementById('f-qty').innerText = qty || "QTY";
        document.getElementById('v-main').innerText = isQtyMode ? (qty || "0") : (rate || "0");
        document.getElementById('f-rate').className = isQtyMode ? "" : "active-txt";
        document.getElementById('f-qty').className = isQtyMode ? "active-txt" : "";
        document.getElementById('add-btn').innerText = editingItemId ? "UPDATE" : "ADD ITEM";
    }

    function saveAndPrint() {
        if (items.length === 0) return;
        const billTotal = items.reduce((sum, i) => sum + i.amt, 0);
        const billQty = items.reduce((sum, i) => sum + i.qty, 0);
        const billData = {
            id: activeBillId || Date.now(),
            timestamp: new Date().toLocaleString('en-IN', {dateStyle:'short', timeStyle:'short'}),
            items: [...items], total: billTotal, totalQty: billQty
        };

        if (activeBillId) {
            const idx = billHistory.findIndex(b => b.id === activeBillId);
            if (idx > -1) billHistory[idx] = billData;
        } else {
            billHistory.unshift(billData);
        }
        localStorage.setItem('pos_history', JSON.stringify(billHistory));

        document.getElementById('r-date').innerText = "Date: " + billData.timestamp;
        document.getElementById('r-total-amt').innerText = fmt(billTotal);
        document.getElementById('r-total-qty').innerText = billQty;
        
        let bodyHtml = "";
        items.forEach((i, index) => { 
            bodyHtml += `<tr><td>${index + 1}</td><td>${fmt(i.rate)}</td><td class="text-center">${i.qty}</td><td class="text-right">${fmt(i.amt)}</td></tr>`; 
        });
        document.getElementById('r-body').innerHTML = bodyHtml;

        // Check toggle status
const includeQR = document.getElementById('qr-toggle').checked;
const qrSection = document.querySelector('.qr-container');

if (includeQR) {
    qrSection.style.display = "block"; // Show in print
    const upiUrl = `upi://pay?pa=${UPI_ID}&pn=${encodeURIComponent(MERCHANT_NAME)}&am=${billTotal.toFixed(2)}&cu=INR`;
    if (typeof QRious !== 'undefined') {
        new QRious({ element: document.getElementById('r-qr'), value: upiUrl, size: 180, level: 'H' });
    }
} else {
    qrSection.style.display = "none"; // Hide in print
}

        setTimeout(() => { window.print(); resetApp(); }, 250);
    }

    function renderHistory() {
        const histEl = document.getElementById('history-list');
        histEl.innerHTML = billHistory.length === 0 ? '<p style="text-align:center;opacity:0.3;margin-top:40px;">NO HISTORY</p>' : '';
        billHistory.forEach(bill => {
            const card = document.createElement('div');
            card.className = "history-card";
            card.innerHTML = `
                <div><b style="color:var(--secondary)">₹${fmt(bill.total)}</b><br><small style="color:#666">${bill.timestamp}</small></div>
                <div>
                    <button class="btn-sm btn-edit" onclick="loadBillForEdit(${bill.id})">EDIT</button>
                    <button class="btn-sm btn-del" onclick="deleteHistory(${bill.id})">DEL</button>
                </div>`;
            histEl.appendChild(card);
        });
    }

    window.loadBillForEdit = (id) => {
        const bill = billHistory.find(b => b.id === id);
        if (bill) {
            items = [...bill.items]; activeBillId = bill.id;
            switchTab('pos'); renderPOS();
        }
    };

    window.deleteHistory = (id) => {
        if(confirm("DELETE?")) {
            billHistory = billHistory.filter(b => b.id !== id);
            localStorage.setItem('pos_history', JSON.stringify(billHistory));
            renderHistory();
        }
    };

    window.editItem = (id) => {
        const item = items.find(i => i.id === id);
        if (item) {
            rate = item.rate.toString(); qty = item.qty.toString();
            editingItemId = id; isQtyMode = false; renderPOS();
        }
    };

    window.deleteItem = (id) => {
        items = items.filter(i => i.id !== id);
        renderPOS();
    };

    function resetApp() {
        items = []; rate = ""; qty = ""; isQtyMode = false; editingItemId = null; activeBillId = null;
        renderPOS();
    }
</script>
</body>
</html>
