<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>SRI KUNJ POS Final</title>
    <style>
        :root {
            --bg: #000000;
            --panel: #121212;
            --primary: #bb86fc;
            --secondary: #03dac6;
            --error: #cf6679;
            --text: #ffffff;
        }

        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; outline: none; }

        body {
            margin: 0; padding: 0;
            background: var(--bg);
            color: var(--text);
            font-family: -apple-system, system-ui, sans-serif;
            overflow: hidden; 
            height: 100vh; width: 100vw;
        }

        .app-wrapper {
            position: fixed;
            top: 0; left: 0; right: 0; bottom: 0;
            display: flex;
        }

        /* --- UI STYLES --- */
        .bill-side { flex: 1.2; display: flex; flex-direction: column; border-right: 1px solid #333; height: 100%; }
        .header { padding: 15px; background: #1a1a1a; display: flex; justify-content: space-between; align-items: center; }
        .item-list { flex: 1; overflow-y: auto; padding: 10px; min-height: 0; }
        .item-card { background: var(--panel); margin-bottom: 8px; padding: 12px; border-radius: 6px; display: flex; justify-content: space-between; align-items: center; border: 1px solid #333; }
        .item-card.editing { border: 1px solid var(--primary); background: #1a1421; }
        .item-info { cursor: pointer; flex: 1; }
        .del-btn { background: var(--error); color: white; border: none; padding: 12px; border-radius: 6px; margin-left: 15px; cursor: pointer; }
        .bill-footer { background: #1a1a1a; padding: 15px; border-top: 1px solid #333; }
        .total-display { display: flex; justify-content: space-between; font-size: 1.8rem; font-weight: bold; color: var(--secondary); margin-bottom: 12px; }
        .calc-side { flex: 0.8; display: flex; flex-direction: column; height: 100%; background: #000; }
        .display-area { height: 25%; padding: 20px; display: flex; flex-direction: column; justify-content: center; text-align: right; border-bottom: 1px solid #333; }
        .formula { color: var(--primary); font-size: 1.1rem; margin-bottom: 5px; }
        .current-val { font-size: 3.2rem; font-weight: bold; }
        .active-txt { border-bottom: 3px solid var(--primary); color: white; }
        .keypad { flex: 1; display: grid; grid-template-columns: repeat(4, 1fr); grid-template-rows: repeat(4, 1fr); gap: 1px; background: #333; }
        .keypad button { background: var(--panel); border: none; color: white; font-size: 1.8rem; cursor: pointer; }
        .keypad button:active { background: #444; }
        .op-btn { background: #1a1a1a !important; color: var(--primary) !important; }
        .enter-btn { background: var(--secondary) !important; color: black !important; grid-column: span 2; font-weight: bold; }
        .clr-btn { color: var(--error) !important; }
        .print-actions { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
        .main-btn { padding: 18px; border: none; border-radius: 6px; font-weight: bold; cursor: pointer; font-size: 1rem; }

        /* --- PRINT STYLES --- */
        #receipt-print { display: none; }

        @media print {
            .app-wrapper { display: none !important; }
            #receipt-print {
                display: block !important;
                width: 58mm;
                color: #000;
                background: #fff;
                font-family: Arial, sans-serif;
                font-size: 12px;
                padding: 0; margin: 0;
            }
            .r-header { text-align: center; padding-top: 5px; }
            .r-shop { font-size: 18px; font-weight: bold; margin: 0; }
            .r-sub { font-size: 11px; margin: 1px 0; }
            .hr { border-top: 1px solid #000; margin: 4px 0; }
            .r-meta { display: flex; justify-content: space-between; font-size: 11px; padding: 2px 0; }
            
            table { width: 100%; border-collapse: collapse; margin: 5px 0; table-layout: fixed; }
            th { font-size: 11px; padding: 4px 0; border-bottom: 1px solid #000; }
            td { padding: 6px 0; font-size: 11px; vertical-align: middle; }
            
            .text-left { text-align: left; }
            .text-right { text-align: right; }
            .text-center { text-align: center; } 
            .bold { font-weight: bold; }

            .t-footer td { 
                padding-top: 10px; 
                border-top: 1px solid #000; 
                font-size: 16px; 
            }

            .r-policy { text-align: center; font-size: 11px; font-weight: bold; margin-top: 15px; }
            @page { size: 58mm auto; margin: 0; }
        }
    </style>
</head>
<body>

    <div class="app-wrapper">
        <div class="bill-side">
            <div class="header">
                <h3 style="margin:0">SRI KUNJ</h3>
                <span id="count" style="color:var(--primary)">0 Items</span>
            </div>
            <div id="item-list" class="item-list"></div>
            <div class="bill-footer">
                <div class="total-display">
                    <span>TOTAL</span>
                    <span id="grand-total">0</span>
                </div>
                <div class="print-actions">
                    <button class="main-btn" style="background:#333; color:white" onclick="resetApp()">RESET</button>
                    <button class="main-btn" style="background:var(--primary); color:black" onclick="window.print()">PRINT</button>
                </div>
            </div>
        </div>

        <div class="calc-side">
            <div class="display-area">
                <div class="formula">
                    <span id="f-rate" class="active-txt">RATE</span> × <span id="f-qty">QTY</span>
                </div>
                <div id="v-main" class="current-val">0</div>
            </div>
            <div class="keypad">
                <button onclick="num('7')">7</button><button onclick="num('8')">8</button><button onclick="num('9')">9</button><button class="op-btn clr-btn" onclick="num('C')">C</button>
                <button onclick="num('4')">4</button><button onclick="num('5')">5</button><button onclick="num('6')">6</button><button class="op-btn" onclick="num('X')">X</button>
                <button onclick="num('1')">1</button><button onclick="num('2')">2</button><button onclick="num('3')">3</button><button class="op-btn" onclick="num('.')">.</button>
                <button onclick="num('0')">0</button><button onclick="num('00')">00</button><button id="add-btn" class="enter-btn" onclick="num('ADD')">ADD ITEM</button>
            </div>
        </div>
    </div>

    <!-- PRINT TEMPLATE -->
    <div id="receipt-print">
        <div class="r-header">
            <div class="r-shop">SRI KUNJ</div>
            <div class="r-sub">LN Road, Islampur</div>
            <div class="r-sub">Phone: 9153306606, 7992265787</div>
        </div>
        
        <div class="hr"></div>
        <div class="r-meta">
            <span id="r-date-label">Date: </span>
            <span id="r-time-label">Time: </span>
        </div>
        <div class="hr"></div>

        <table>
            <thead>
                <tr>
                    <!-- All widths set to 25% for uniformity -->
                    <th width="25%" class="text-left">#</th>
                    <th width="25%" class="text-left">Rate</th>
                    <th width="25%" class="text-center">Qty</th>
                    <th width="25%" class="text-right">Total</th>
                </tr>
            </thead>
            <tbody id="r-body"></tbody>
            <tfoot>
                <tr class="t-footer">
                    <td colspan="2" class="bold">Total</td>
                    <td id="r-qty-sum" class="text-center bold">0</td>
                    <td id="r-total-val" class="text-right bold">0</td>
                </tr>
            </tfoot>
        </table>

        <div class="hr"></div>
        <div class="r-policy">NO EXCHANGE NO REFUND</div>
    </div>

<script>
    let items = [];
    let rate = "";
    let qty = "";
    let isQtyMode = false;
    let editingId = null;

    const formatIndian = (num) => {
        return new Intl.NumberFormat('en-IN').format(Math.round(num));
    };

    function render() {
        const listEl = document.getElementById('item-list');
        const rBodyEl = document.getElementById('r-body');
        listEl.innerHTML = "";
        rBodyEl.innerHTML = "";
        let totalVal = 0;
        let totalQtySum = 0;

        items.forEach((item, index) => {
            totalVal += item.amt;
            totalQtySum += item.qty;
            const sno = index + 1;
            
            listEl.innerHTML += `
                <div class="item-card ${editingId === item.id ? 'editing' : ''}">
                    <div class="item-info" onclick="editItem(${item.id})">
                        <div style="font-size:0.9rem; opacity:0.8">#${sno} | Rate: ${formatIndian(item.rate)} × ${item.qty}</div>
                        <div style="color:var(--secondary); font-weight:bold">${formatIndian(item.amt)}</div>
                    </div>
                    <button class="del-btn" onclick="delItem(${item.id})">DEL</button>
                </div>`;

            rBodyEl.innerHTML += `
                <tr>
                    <td class="text-left">${sno}</td>
                    <td class="text-left">${item.rate.toFixed(2)}</td>
                    <td class="text-center">${item.qty}</td>
                    <td class="text-right">${formatIndian(item.amt)}</td>
                </tr>`;
        });

        document.getElementById('grand-total').innerText = formatIndian(totalVal);
        document.getElementById('r-total-val').innerText = formatIndian(totalVal);
        document.getElementById('r-qty-sum').innerText = totalQtySum;
        document.getElementById('count').innerText = items.length + " Items";
        
        const now = new Date();
        const d = String(now.getDate()).padStart(2, '0') + '-' + String(now.getMonth() + 1).padStart(2, '0') + '-' + now.getFullYear();
        const t = now.toLocaleTimeString('en-US', { hour: 'numeric', minute: '2-digit', hour12: true });
        
        document.getElementById('r-date-label').innerText = "Date: " + d;
        document.getElementById('r-time-label').innerText = "Time: " + t;

        updateCalc();
    }

    function updateCalc() {
        const main = document.getElementById('v-main');
        const fRate = document.getElementById('f-rate');
        const fQty = document.getElementById('f-qty');
        
        if (isQtyMode) {
            main.innerText = qty || "0";
            fQty.className = "active-txt";
            fRate.className = "";
        } else {
            main.innerText = rate || "0";
            fRate.className = "active-txt";
            fQty.className = "";
        }
        fRate.innerText = rate || "RATE";
        fQty.innerText = qty || "QTY";
        document.getElementById('add-btn').innerText = editingId ? "UPDATE" : "ADD ITEM";
    }

    function num(k) {
        if (k === 'C') {
            if (isQtyMode && qty) qty = "";
            else { rate = ""; qty = ""; isQtyMode = false; editingId = null; }
        } else if (k === 'X') {
            isQtyMode = !isQtyMode;
        } else if (k === 'ADD') {
            if (!rate || !qty) return;
            const item = {
                id: editingId || Date.now(),
                rate: parseFloat(rate),
                qty: parseFloat(qty),
                amt: parseFloat(rate) * parseFloat(qty)
            };
            if (editingId) {
                const idx = items.findIndex(x => x.id === editingId);
                items[idx] = item;
            } else {
                items.push(item);
            }
            rate = ""; qty = ""; isQtyMode = false; editingId = null;
        } else {
            if (isQtyMode) {
                if (k === "." && qty.includes(".")) return;
                qty += k;
            } else {
                if (k === "." && rate.includes(".")) return;
                rate += k;
            }
        }
        render();
    }

    function editItem(id) {
        const item = items.find(x => x.id === id);
        rate = item.rate.toString();
        qty = item.qty.toString();
        editingId = id;
        isQtyMode = false;
        render();
    }

    function delItem(id) {
        items = items.filter(x => x.id !== id);
        if (editingId === id) { rate = ""; qty = ""; editingId = null; }
        render();
    }

    function resetApp() {
        items = []; rate = ""; qty = ""; isQtyMode = false; editingId = null;
        render();
    }

    render();
</script>
</body>
</html>
